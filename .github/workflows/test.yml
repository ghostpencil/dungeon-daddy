name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Type-check
        run: python -m mypy dungeon_daddy

      - name: Test with coverage
        run: python -m pytest --ignore=tests/integration/test_ui_harness.py --cov=dungeon_daddy --cov-report=term-missing --cov-fail-under=70
